<header>
  <h1>🏟️ 2026 CPBL 賽季中心</h1>
  <p>從賽季視角掌握全聯盟狀態</p>
</header>

<main>

  <!-- 🟦 賽季進度 -->
  <section class="card">
    <h2>📊 賽季進度</h2>
    <div id="seasonProgress">計算中…</div>
  </section>

  <!-- 🟦 各隊狀態 -->
  <section class="card">
    <h2>🔥 各隊目前狀態</h2>
    <div id="teamStatusGrid" class="home-grid"></div>
  </section>
  <section class="card" style="margin-top:16px;">
  <h2>🧾 對戰戰績</h2>
  <div class="muted" style="margin-bottom:10px;">※ 只統計已結束（final）的比賽</div>
  <div id="h2hTableWrap"></div>
</section>
  <section class="card" style="margin-top:16px;">
  <h2>📌 對戰明細</h2>
  <div id="h2hDetailHint" class="muted" style="margin-bottom:10px;">
    點上方「對戰戰績」任一格，這裡會顯示該兩隊的所有比賽
  </div>
  <div id="h2hDetailList"></div>
</section>

<!-- 👇 就放在這裡 -->
<div class="season-card" id="todayGamesCard">
  <h2>📅 今日賽事</h2>
  <p class="today-hint">👉 點擊比賽可查看當日完整賽程</p>

  <div class="today-content">讀取中…</div>
</div>

<!-- 👇 下面才是其他東西（表格、清單等） -->


  <!-- 🟦 賽季里程碑 -->
  <section class="card">
    <h2>🗓️ 賽季里程碑</h2>
    <ul>
      <li>🔥 開幕戰｜2026/03/28</li>
      <li>⭐ 明星賽｜2026/07/18–19</li>
      <li>🏁 總冠軍賽｜2026 11/17-11/25</li>
    </ul>
  </section>

</main>
