<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>CPBL 球隊總覽</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">CPBL</a>
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="schedule.html">賽程</a>
    <a class="nav-link" href="standings.html">戰績</a>
    <a class="nav-link active" href="teams.html">球隊</a>
    <a class="nav-link" href="season.html">賽季</a>
    
  </div>
</nav>

<header class="team-header">
  <h1 id="pageTitle">球隊</h1>
  <p id="pageSub">讀取中…</p>
</header>

<main>
  <div class="team-theme-zone">
    <div id="teamDetail">載入中…</div>
  </div>
</main>

<footer>
 © 2026 CPBL Data Site ｜ 
 <span class="site-version"></span> ｜ 
 明叡 × ChatGPT
</footer>


<script>
/* =========================
   Team Page – Overview Only
   ========================= */

// 讀取 team 參數
const params = new URLSearchParams(location.search);
const teamId = params.get("team");
const linkRoster = document.getElementById("linkRoster");
const linkStats = document.getElementById("linkStats");
const linkSchedule = document.getElementById("linkSchedule");

if (teamId) {
  if (linkRoster) linkRoster.href = `team-roster.html?team=${teamId}`;
  if (linkStats) linkStats.href = `team-stats.html?team=${teamId}`;
  if (linkSchedule) linkSchedule.href = `team-schedule.html?team=${teamId}`;
}

const pageTitle = document.getElementById("pageTitle");
const pageSub   = document.getElementById("pageSub");
const detailBox = document.getElementById("teamDetail");

if (!teamId) {
  detailBox.innerHTML = "<p style='color:red;'>缺少 team 參數</p>";
  throw new Error("missing team");
}

// 載入球隊資料
fetch("data/teams.json")
  .then(r => r.json())
  .then(teams => {
    const team = teams.find(t => t.id === teamId);
    if (!team) throw new Error("team not found");

    pageTitle.textContent = team.name;
    pageSub.textContent = `${team.city}｜${team.home}`;

    // ⭐ 套用球隊主題 class（黃色邊框就是靠這個）
    document.body.classList.add(`team-${team.id}`);

    detailBox.innerHTML = `
      <div class="team-detail-card">
        <img src="assets/logo/${team.id}.png" class="team-logo-xl" alt="${team.name}">
        <h2>${team.name}</h2>

        <ul class="team-meta">
          <li>📍 城市：${team.city}</li>
          <li>🏟️ 主場：${team.home}</li>
          <li>📅 成立：${team.founded}</li>
        </ul>

        <div class="team-btn-row">
          <a class="team-btn" href="team-schedule.html?team=${team.id}">
            📅 球隊賽程
          </a>
          <a class="team-btn" href="team-roster.html?team=${team.id}">
            👥 教練 / 球員名單
          </a>
        </div>

        <a class="back-link" href="teams.html">← 回球隊列表</a>
      </div>
    `;
  })
  .catch(err => {
    console.error(err);
    detailBox.innerHTML =
      "<p style='color:red;'>球隊資料載入失敗</p>";
  });
</script>
<script src="js/version.js"></script>

</body>
</html>
