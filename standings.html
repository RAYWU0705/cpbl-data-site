<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>CPBL 戰績</title>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">CPBL</a>
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="schedule.html">賽程</a>
    <a class="nav-link active" href="standings.html">戰績</a>
    <a class="nav-link" href="teams.html">球隊</a>
    <a class="nav-link" href="season.html">賽季</a>

  </div>
</nav>

<header>
  <h1>戰績</h1>
  <p>（目前為手動戰績表；未來可升級自動計算）</p>
</header>

<main>
  <div style="margin-bottom:16px; display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
    <label for="seasonSelect">賽季：</label>
    <select id="seasonSelect">
      <option value="2026">2026</option>
    </select>
    <label for="splitSelect">區段：</label>
<select id="splitSelect">
  <option value="full">全年</option>
  <option value="first">上半季</option>
  <option value="second">下半季</option>
</select>

<label for="teamSearch">搜尋球隊：</label>
<input id="teamSearch" type="text" placeholder="例如：中信 / 兄弟 / 猿" style="padding:6px 10px;">

    <button id="reloadBtn">重新讀取</button>

    <span id="statusText" style="color:#666;"></span>
  </div>

  <div id="standingsWrap"></div>

  <hr style="margin:24px 0; opacity:.25;">

  <details>
    <summary style="cursor:pointer;">📌 未來升級：自動計算戰績（需要比分）</summary>
    <div style="margin-top:10px; color:#444; line-height:1.7;">
      <p>如果你之後在賽程 JSON 加上比分欄位，例如：</p>
      <pre style="background:#fff; padding:12px; border-radius:8px; overflow:auto; border:1px solid rgba(0,0,0,0.1);">
{"date":"2026-04-01","away":"味全龍","home":"中信兄弟","awayScore":3,"homeScore":5}
      </pre>
      <p>那我可以幫你在這頁加「一鍵從賽程自動計算」按鈕。</p>
    </div>
  </details>
</main>

<footer>
 © 2026 CPBL Data Site ｜ 
 <span class="site-version"></span> ｜ 
 明叡 × ChatGPT
</footer>
<script type="module">

import { loadGames, filterGames } from "./js/games-data.js";
import { calculateStandings } from "./js/standingsEngine.js";

/* ========= 常數 ========= */

const TEAM_KEYS = {
  "中信兄弟": "brothers",
  "統一7-ELEVEn獅": "lions",
  "樂天桃猿": "monkeys",
  "味全龍": "dragons",
  "富邦悍將": "guardians",
  "台鋼雄鷹": "hawks"
};

/* ========= DOM ========= */

const standingsWrap = document.getElementById("standingsWrap");
const seasonSelect  = document.getElementById("seasonSelect");
const splitSelect   = document.getElementById("splitSelect");
const reloadBtn     = document.getElementById("reloadBtn");
const statusText    = document.getElementById("statusText");
const teamSearch    = document.getElementById("teamSearch");

/* ========= 狀態 ========= */

let currentSeason = "2026";
let currentSplit  = "full";
let rawStandings  = [];

/* ========= 工具 ========= */

function setStatus(msg){
  statusText.textContent = msg;
}

/* ========= 核心渲染 ========= */

async function updateStandings(){

  setStatus("計算中…");

  await loadGames("2026-03"); // 你之後可以改成全年月份迴圈

  const games = filterGames({
    month: "2026-03"
  });

  rawStandings = calculateStandings(games);

  renderStandings(rawStandings);

  setStatus(`✅ 已計算（${rawStandings.length} 隊）`);
}

/* ========= 顯示 ========= */

function renderStandings(rows){

  if (!rows.length){
    standingsWrap.innerHTML = "<p>尚無戰績資料</p>";
    return;
  }

  standingsWrap.innerHTML = `
    <table class="standings-table">
      <thead>
        <tr>
          <th>#</th>
          <th>球隊</th>
          <th>出賽</th>
          <th>勝</th>
          <th>敗</th>
          <th>主場</th>
          <th>客場</th>
          <th>勝率</th>
          <th>勝差</th>
          <th>近況</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((t,i)=>`
          <tr class="standings-row" data-team="${TEAM_KEYS[t.team]}">
            <td>${i+1}</td>

            <td>
              <div class="team-wrap">
                <img src="assets/logo/${TEAM_KEYS[t.team]}.png">
                ${t.team}
              </div>
            </td>

            <td>${t.games}</td>
            <td>${t.wins}</td>
            <td>${t.losses}</td>

            <td>${t.homeWins}-${t.homeLosses}</td>
            <td>${t.awayWins}-${t.awayLosses}</td>

            <td>${t.winPct.toFixed(3)}</td>
            <td>${t.gb}</td>

            <td>
              ${
                t.streakType
                ? t.streakType + t.streakCount
                : "-"
              }
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  // 點擊跳轉
  document.querySelectorAll(".standings-row").forEach(row=>{
    row.style.cursor = "pointer";
    row.addEventListener("click",()=>{
      const teamId = row.dataset.team;
      location.href = `team.html?team=${teamId}`;
    });
  });
}

/* ========= 搜尋 ========= */

teamSearch.addEventListener("input", ()=>{
  const q = teamSearch.value.trim();
  if (!q){
    renderStandings(rawStandings);
    return;
  }

  renderStandings(
    rawStandings.filter(t=>t.team.includes(q))
  );
});

/* ========= 事件 ========= */

reloadBtn.addEventListener("click", updateStandings);
seasonSelect.addEventListener("change", updateStandings);
splitSelect.addEventListener("change", updateStandings);

/* ========= 啟動 ========= */

updateStandings();

</script>
<script src="js/version.js"></script>

</body>
</html>
