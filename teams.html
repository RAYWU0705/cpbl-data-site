<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b3c5d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CPBL Data">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/logo/cpbl.png">
  <title>CPBL 球隊｜Ray's CPBL Data Site</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .team-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
      transition: 0.25s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .team-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    .team-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: var(--team-color, #ccc);
    }

    .team-logo-lg {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .team-card h3 {
      margin: 8px 0 10px;
      font-size: 20px;
      font-weight: 950;
    }

    .team-card p {
      min-height: 52px;
      margin: 0;
      color: #666;
      line-height: 1.7;
    }

    .team-card-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .team-btn {
      padding: 7px 10px;
      border-radius: 9px;
      background: #0b4a6f;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
    }

    .team-btn:hover {
      background: #083a57;
    }

    .teams-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .teams-toolbar input {
      flex: 1;
      min-width: 240px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d7dce3;
      font-size: 14px;
    }

    .teams-toolbar button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #0b4a6f;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }

    .teams-toolbar button:hover {
      background: #083a57;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    @media (max-width: 600px) {
      .team-logo-lg {
        width: 70px;
        height: 70px;
      }

      .teams-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .teams-toolbar input,
      .teams-toolbar button {
        width: 100%;
      }
    }
  </style>
</head>

<body data-page="teams">

<nav class="nav">
  <div class="nav-inner">

    <div class="nav-left">
      <a class="brand" href="index.html">CPBL</a>
      <a class="nav-link" href="index.html">首頁</a>
      <a class="nav-link" href="schedule.html">賽程</a>
      <a class="nav-link" href="standings.html">戰績</a>
      <a class="nav-link active" href="teams.html">球隊</a>
      <a class="nav-link" href="rules.html">棒球規則</a>
      <a class="nav-link" href="season.html">賽季</a>
      <a class="nav-link" href="version.html">版本</a>
      <a class="nav-link" href="about.html">網站介紹</a>
    </div>
    <div class="nav-teams" aria-label="球隊快速入口">
      <a href="team.html?team=brothers"><img src="assets/logo/brothers.png" alt="中信兄弟"></a>
      <a href="team.html?team=lions"><img src="assets/logo/lions.png" alt="統一7-ELEVEn獅"></a>
      <a href="team.html?team=monkeys"><img src="assets/logo/monkeys.png" alt="樂天桃猿"></a>
      <a href="team.html?team=dragons"><img src="assets/logo/dragons.png" alt="味全龍"></a>
      <a href="team.html?team=guardians"><img src="assets/logo/guardians.png" alt="富邦悍將"></a>
      <a href="team.html?team=hawks"><img src="assets/logo/hawks.png" alt="台鋼雄鷹"></a>
    </div>

  </div>
</nav>

<header class="hero">
  <p class="muted">Ray's Unofficial CPBL Data Site</p>
  <h1>球隊列表</h1>
  <p>Teams · Rosters · Team Profiles</p>

  <div class="hero-actions">
    <button id="reloadBtn" type="button">重新載入</button>
    <a href="standings.html">查看戰績</a>
    <a href="schedule.html">查看賽程</a>
    <a href="index.html">回首頁</a>
  </div>

  <p class="muted">點擊球隊查看詳細介紹或數據分析。</p>
</header>

<main class="container">

  <section class="home-card">
    <h2>🔎 搜尋球隊</h2>

    <div class="teams-toolbar">
      <input id="teamSearch" placeholder="搜尋球隊（兄弟 / 獅 / 桃猿…）">
      <span id="statusText" class="muted">載入中…</span>
    </div>
  </section>

  <section class="home-card">
    <h2>⚾ CPBL 球隊</h2>
    <div id="teamList" class="team-grid"></div>
  </section>

</main>

<footer>
  © 2026 CPBL Data Site ｜ 
  <span class="site-version"></span> ｜ 
  明叡 × ChatGPT
</footer>

<script>
const teamList   = document.getElementById("teamList");
const teamSearch = document.getElementById("teamSearch");
const reloadBtn  = document.getElementById("reloadBtn");
const statusText = document.getElementById("statusText");

let teams = [];

/* ========= 球隊顏色 ========= */
const TEAM_COLOR = {
  brothers: "#FFCC00",
  lions: "#FF6600",
  monkeys: "#990000",
  dragons: "#C8102E",
  guardians: "#005BAC",
  hawks: "#006666"
};

/* ========= 別名搜尋 ========= */
function normalize(str) {
  return (str || "").toLowerCase();
}

function matchTeam(t, q) {
  const name = normalize(t.name);
  const id   = normalize(t.id);

  return (
    name.includes(q) ||
    id.includes(q) ||
    (q.includes("兄弟") && id === "brothers") ||
    (q.includes("獅") && id === "lions") ||
    (q.includes("猿") && id === "monkeys") ||
    (q.includes("龍") && id === "dragons") ||
    (q.includes("邦") && id === "guardians") ||
    (q.includes("鷹") && id === "hawks")
  );
}

/* ========= 防止 HTML 注入 ========= */
function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

/* ========= 渲染 ========= */
function renderList(rows) {
  if (!rows.length) {
    teamList.innerHTML = "<p class='muted'>沒有符合的球隊</p>";
    return;
  }

  teamList.innerHTML = rows.map(t => `
    <div class="team-card" style="--team-color:${TEAM_COLOR[t.id] || "#ccc"}" data-id="${escapeHtml(t.id)}">

      <img src="assets/logo/${escapeHtml(t.id)}.png"
           class="team-logo-lg"
           alt="${escapeHtml(t.name)}"
           onerror="this.src='assets/logo/default.png'">

      <h3>${escapeHtml(t.name)}</h3>
      <p>主場：${escapeHtml(t.home || "資料待補")}</p>

      <div class="team-card-actions">
        <a href="team.html?team=${escapeHtml(t.id)}" class="team-btn" onclick="event.stopPropagation()">📄 介紹</a>
        <a href="team-stats.html?team=${escapeHtml(t.id)}" class="team-btn" onclick="event.stopPropagation()">📈 數據</a>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".team-card").forEach(card => {
    card.addEventListener("click", () => {
      location.href = `team.html?team=${card.dataset.id}`;
    });
  });
}

/* ========= 搜尋 ========= */
function applySearch() {
  const q = normalize(teamSearch.value.trim());
  if (!q) {
    renderList(teams);
    return;
  }

  renderList(teams.filter(t => matchTeam(t, q)));
}

/* ========= 載入 ========= */
async function loadTeams() {
  statusText.textContent = "載入中…";
  teamList.innerHTML = `<div class="loading">讀取球隊資料中…</div>`;

  try {
    const res = await fetch(`data/teams.json?ts=${Date.now()}`, {
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();

    teams = Array.isArray(data)
      ? data.sort((a, b) => a.id.localeCompare(b.id))
      : [];

    statusText.textContent = `✅ ${teams.length} 隊`;
    renderList(teams);

  } catch (e) {
    console.error(e);
    statusText.textContent = "❌ 失敗";
    teamList.innerHTML = "<p style='color:red;'>讀取失敗</p>";
  }
}

/* ========= 事件 ========= */
reloadBtn.onclick = loadTeams;
teamSearch.oninput = applySearch;

/* ========= 啟動 ========= */
loadTeams();
</script>

<script src="js/version.js"></script>
<script src="js/pwa-register.js"></script>
</body>
</html>
