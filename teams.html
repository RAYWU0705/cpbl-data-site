<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>CPBL 球隊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">CPBL</a>
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="schedule.html">賽程</a>
    <a class="nav-link" href="standings.html">戰績</a>
    <a class="nav-link active" href="teams.html">球隊</a>
    <a class="nav-link" href="season.html">賽季</a>

  </div>
</nav>

<header>
  <h1>球隊列表</h1>
  <p style="opacity:.85;">點擊球隊查看詳細介紹或數據分析</p>
</header>

<main style="max-width:1100px; margin:auto; padding:24px;">

  <!-- 搜尋 -->
  <div style="margin-bottom:20px; display:flex; gap:12px; align-items:center;">
    <input id="teamSearch"
           type="text"
           placeholder="搜尋球隊（兄弟 / 獅 / 桃猿…）"
           style="padding:8px 12px; flex:1;">
    <button id="reloadBtn">重新載入</button>
    <span id="statusText" style="color:#666;"></span>
  </div>

  <!-- 球隊卡片區 -->
  <div id="teamList" class="team-grid"></div>
  

</main>

<footer>
 © 2026 CPBL Data Site ｜ 
 <span class="site-version"></span> ｜ 
 明叡 × ChatGPT
</footer>


<script>
/* ========= DOM ========= */
const teamList   = document.getElementById("teamList");
const teamSearch = document.getElementById("teamSearch");
const reloadBtn  = document.getElementById("reloadBtn");
const statusText = document.getElementById("statusText");

/* ========= 狀態 ========= */
let teams = [];

/* ========= 工具 ========= */
function setStatus(msg){
  statusText.textContent = msg;
}

/* ========= 渲染球隊列表 ========= */
function renderList(rows){
  teamList.innerHTML = "";

  if (!rows || rows.length === 0){
    teamList.innerHTML = "<p style='color:#666;'>沒有符合的球隊</p>";
    return;
  }

  rows.forEach(t => {
    const card = document.createElement("div");
    card.className = "team-card";

    card.innerHTML = `
      <img src="assets/logo/${t.id}.png"
           alt="${t.name}"
           class="team-logo-lg">

      <h3>${t.name}</h3>
      <p style="opacity:.8;">主場：${t.home}</p>

      <div style="margin-top:12px; display:flex; gap:8px;">
        <a href="team.html?team=${encodeURIComponent(t.id)}"
           class="team-btn"
           style="flex:1; text-align:center;">
          📄 球隊介紹
        </a>

        <a href="team-stats.html?team=${encodeURIComponent(t.id)}"
           class="team-btn"
           style="flex:1; text-align:center;">
          📈 數據分析
        </a>
      </div>
    `;

    teamList.appendChild(card);
  });
}

/* ========= 搜尋 ========= */
function applySearch(){
  const q = teamSearch.value.trim();
  if (!q){
    renderList(teams);
    return;
  }

  const filtered = teams.filter(t =>
    (t.name || "").includes(q) ||
    (t.city || "").includes(q) ||
    (t.home || "").includes(q)
  );

  renderList(filtered);
}

/* ========= 載入 teams.json ========= */
async function loadTeams(){
  setStatus("載入中：data/teams.json");
  teamList.innerHTML = "";

  try{
    const res = await fetch("data/teams.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error("teams.json 格式錯誤");

    teams = data;
    setStatus(`✅ 已載入 ${teams.length} 支球隊`);
    renderList(teams);
  }catch(err){
    console.error(err);
    setStatus("❌ 載入失敗，請確認 data/teams.json 是否存在");
    teamList.innerHTML = "<p style='color:red;'>球隊資料讀取失敗</p>";
  }
}

/* ========= 事件 ========= */
reloadBtn.addEventListener("click", loadTeams);
teamSearch.addEventListener("input", applySearch);

/* ========= 啟動 ========= */
loadTeams();
</script>
<script src="js/version.js"></script>

</body>
</html>
