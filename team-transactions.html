<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CPBL 球員異動｜Ray's CPBL Data Site</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/team-transactions.css">
</head>

<body data-page="team-transactions">

<nav class="nav">
  <div class="nav-inner">

    <div class="nav-left">
      <a class="brand" href="index.html">CPBL</a>
      <a class="nav-link" href="index.html">首頁</a>
      <a class="nav-link active" href="schedule.html">賽程</a>
      <a class="nav-link" href="standings.html">戰績</a>
      <a class="nav-link" href="teams.html">球隊</a>
      <a class="nav-link" href="rules.html">棒球規則</a>
      <a class="nav-link" href="game-day.html">今日戰情</a>
      <a class="nav-link" href="version.html">版本</a>
    </div>

    <div class="nav-teams" aria-label="球隊快速入口">
      <a href="team.html?team=brothers"><img src="assets/logo/brothers.png" alt="中信兄弟"></a>
      <a href="team.html?team=lions"><img src="assets/logo/lions.png" alt="統一7-ELEVEn獅"></a>
      <a href="team.html?team=monkeys"><img src="assets/logo/monkeys.png" alt="樂天桃猿"></a>
      <a href="team.html?team=dragons"><img src="assets/logo/dragons.png" alt="味全龍"></a>
      <a href="team.html?team=guardians"><img src="assets/logo/guardians.png" alt="富邦悍將"></a>
      <a href="team.html?team=hawks"><img src="assets/logo/hawks.png" alt="台鋼雄鷹"></a>
    </div>

  </div>
</nav>

<header class="hero transaction-hero">
  <div class="transaction-hero-bg"></div>

  <div class="transaction-hero-inner">
    <div class="transaction-hero-main">
      <p class="muted">Ray's Unofficial CPBL Data Site</p>
      <h1 id="pageTitle">球員異動</h1>
      <p id="pageSub">載入中…</p>

      <div class="hero-actions">
        <a id="backToTeam">← 回球隊總覽</a>
        <a href="teams.html">返回球隊列表</a>
        <a href="standings.html">查看戰績</a>
        <a href="index.html">回首頁</a>
      </div>

      <p class="muted">Player Transactions · Roster Moves · Team Updates</p>
    </div>

    <div class="transaction-hero-logo-card">
      <img id="teamLogo" src="assets/logo/cpbl.png" alt="球隊 Logo">
      <span id="teamBadgeText">TRANSACTIONS</span>
    </div>
  </div>
</header>

<main class="container">

  <section class="home-card team-detail-card transaction-shell">

    <div class="squad-tabs transaction-tabs">
      <a id="tabFirst" href="#">一軍名單</a>
      <a id="tabSecond" href="#">二軍名單</a>
      <a id="tabTransactions" class="active" href="#">球員異動</a>
    </div>

    <div class="transaction-page-head">
      <div>
        <span class="section-kicker">ROSTER MOVES</span>
        <h2>🔁 球員異動紀錄</h2>
        <p class="muted">依日期、異動類型與球員姓名快速篩選。</p>
      </div>

      <div id="transactionsSummary" class="transaction-summary-pill">載入中…</div>
    </div>

    <div id="transactionStats" class="transaction-stat-grid">
      <div class="transaction-stat-card">
        <span>全部異動</span>
        <strong>—</strong>
      </div>
      <div class="transaction-stat-card">
        <span>升一軍</span>
        <strong>—</strong>
      </div>
      <div class="transaction-stat-card">
        <span>降二軍</span>
        <strong>—</strong>
      </div>
      <div class="transaction-stat-card">
        <span>最近月份</span>
        <strong>—</strong>
      </div>
    </div>

    <div class="transactions-toolbar transaction-filter-card">
      <label>
        <span>月份</span>
        <select id="monthFilter">
          <option value="">全部月份</option>
        </select>
      </label>

      <label>
        <span>異動</span>
        <select id="reasonFilter">
          <option value="">全部異動</option>
          <option value="升一軍">升一軍</option>
          <option value="降二軍">降二軍</option>
          <option value="新註冊">新註冊</option>
          <option value="註銷">註銷</option>
        </select>
      </label>

      <label>
        <span>搜尋</span>
        <input id="playerSearch" type="search" placeholder="搜尋球員姓名 / 備註">
      </label>

      <button id="btnClearTransactionFilter" type="button">清除篩選</button>
    </div>

    <div id="activeTransactionFilters" class="active-transaction-filters"></div>

    <div id="transactionsList" class="transaction-list">載入中…</div>

  </section>

</main>

<footer>
  © 2026 CPBL Data Site ｜
  <span class="site-version"></span> ｜
  明叡 × ChatGPT
</footer>

<script src="js/team-transactions.js"></script>
<script src="js/version.js"></script>

</body>
</html>
