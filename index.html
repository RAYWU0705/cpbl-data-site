<script>
const TEAM_NAME_MAP = {
  brothers: "中信兄弟",
  lions: "統一7-ELEVEn獅",
  monkeys: "樂天桃猿",
  dragons: "味全龍",
  guardians: "富邦悍將",
  hawks: "台鋼雄鷹"
};

/* =========================
   首頁：戰績 TOP 3（2026）
   ========================= */
function getHome(g) {
  return g.teams?.home ?? "（未知）";
}

function getAway(g) {
  return g.teams?.away ?? "（未知）";
}

fetch("data/standings-2026.json")
  .then(res => {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  })
  .then(rows => {
    if (!Array.isArray(rows)) {
      throw new Error("JSON 格式錯誤");
    }

    // 計算勝率（避免除以 0）
    rows.forEach(t => {
      const total = t.wins + t.losses + t.ties;
      t.winPct = total > 0 ? (t.wins / total) : 0;
    });

    // 排序：勝率 → 勝場
    const sorted = rows
      .slice()
      .sort((a, b) => {
        if (b.winPct !== a.winPct) {
          return b.winPct - a.winPct;
        }
        return b.wins - a.wins;
      })
      .slice(0, 6);

    const list = document.getElementById("top3List");
    list.innerHTML = "";

    sorted.forEach((t, idx) => {
  const li = document.createElement("li");

  // 對應 teamId（跟 teams.json 一致）
  const teamMap = {
    "中信兄弟": "brothers",
    "統一7-ELEVEn獅": "lions",
    "樂天桃猿": "monkeys",
    "味全龍": "dragons",
    "富邦悍將": "fubon",
    "台鋼雄鷹": "hawks"
  };

  const teamId = teamMap[t.team] || "";

  li.innerHTML = `
  <span class="rank">${idx + 1}</span>
  <a class="team" href="team.html?team=${teamId}">
    ${t.team}
  </a>
  <span class="record">
    ${t.wins}-${t.losses}-${t.ties}
    (${t.winPct.toFixed(3)})
  </span>
`;
// 連勝 / 連敗文字
let streakText = "";
let streakClass = "";

if (t.streak) {
  if (t.streak.startsWith("W")) {
    streakText = `${t.streak.slice(1)} 連勝`;
    streakClass = "streak-win";
  } else if (t.streak.startsWith("L")) {
    streakText = `${t.streak.slice(1)} 連敗`;
    streakClass = "streak-lose";
  }
}

li.innerHTML = `
  <span class="rank">${idx + 1}</span>

  <a class="team" href="team.html?team=${teamId}">
    ${t.team}
  </a>

  <span class="record">
    ${t.wins}-${t.losses}-${t.ties}
    (${t.winPct.toFixed(3)})
  </span>

  ${streakText ? `<span class="streak ${streakClass}">${streakText}</span>` : ""}
`;


  list.appendChild(li);
});

  })
  .catch(err => {
    const list = document.getElementById("top3List");
    if (!list) return;
    list.innerHTML = "";

  });
</script>
<script>
/* =========================
   首頁：今日賽程（強化版）
   ========================= */
(function () {
  const box = document.getElementById("todayGames");
  if (!box) return;

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  const todayStr = `${yyyy}-${mm}-${dd}`;

  const months = ["2026-03", "2026-04","2026-06","2026-07","2026-08"].filter(m => m >= "2026-03");

  Promise.all(
    months.map(m =>
      fetch(`data/schedule-${m}.json`)
        .then(r => r.ok ? r.json() : [])
        .catch(() => [])
    )
  ).then(results => {
    const games = results.flat().filter(g => g.date);

    // 今天的比賽
    const todayGames = games.filter(g => g.date === todayStr);

    if (todayGames.length) {
      box.innerHTML = todayGames.map(g => `
        <div class="mini-game-card">
         <strong>${getAway(g)} vs ${getHome(g)}</strong>

          ⏰ ${g.time || "時間未定"}
        </div>
      `).join("");
      return;
    }

    // 👉 沒有今天 → 找最近一場未來比賽
    const upcoming = games
      .filter(g => g.date > todayStr)
      .sort((a,b) => a.date.localeCompare(b.date))[0];

    if (!upcoming) {
      box.innerHTML = `<p class="muted">近期沒有賽程</p>`;
      return;
    }

    box.innerHTML = `
      <p class="muted">今日無賽程</p>
      <p><strong>🔜 最近賽事</strong></p>
      <p>📅 ${upcoming.date}</p>
      <p>⚔️ ${getAway(upcoming)} vs ${getHome(upcoming)}</p>

    `;
  }).catch(() => {
    box.innerHTML = `<p class="muted">賽程載入失敗</p>`;
  });
})();
</script>

<script>
/* =========================
   首頁比分橫條 v4 穩定完整版
========================= */

document.addEventListener("DOMContentLoaded", () => {

  const scoreTrack = document.getElementById("scoreTrack");
  const strip      = document.querySelector(".score-strip");
  const leftBtn    = document.querySelector(".score-nav.left");
  const rightBtn   = document.querySelector(".score-nav.right");

  if (!scoreTrack || !strip) return;

  const TEAM_ID_MAP = {
    "中信兄弟": "brothers",
    "統一7-ELEVEn獅": "lions",
    "樂天桃猿": "monkeys",
    "味全龍": "dragons",
    "富邦悍將": "guardians",
    "台鋼雄鷹": "hawks"
  };

  const months = [
    "2026-03","2026-04","2026-05",
    "2026-06","2026-07","2026-08"
  ];

  /* =========================
     載入賽程
  ========================= */

  Promise.all(
    months.map(m =>
      fetch(`data/schedule-${m}.json`)
        .then(r => r.ok ? r.json() : [])
        .catch(() => [])
    )
  ).then(results => {

    const games = results
      .flat()
      .filter(g => g?.date && g?.teams?.home && g?.teams?.away)
      .sort((a,b)=>a.date.localeCompare(b.date));

    if (!games.length) {
      scoreTrack.innerHTML =
        `<div class="score-loading">賽程載入中…</div>`;
      return;
    }

    const upcoming = games.slice(0,7);

    scoreTrack.innerHTML = upcoming.map(g => {

      const homeName = g.teams.home;
      const awayName = g.teams.away;

      const homeId = TEAM_ID_MAP[homeName];
      const awayId = TEAM_ID_MAP[awayName];

      const hasScore =
        typeof g.homeScore === "number" &&
        typeof g.awayScore === "number";

      const gameId =
        g.date.replaceAll("-", "") +
        "_" +
        homeId +
        "_" +
        awayId;
      
      return `
         

    
    <div class="score-date">${g.date}</div>
        <a class="score-card"
           href="match.html?gameId=${gameId}&date=${encodeURIComponent(g.date)}&home=${encodeURIComponent(homeName)}&away=${encodeURIComponent(awayName)}">

          <div class="score-date">${g.date}</div>

          <div class="score-team-row away">
            <img src="assets/logo/${awayId}.png"
                 onerror="this.style.display='none'">
            <span>${awayName}</span>
            ${hasScore ? `<span class="score">${g.awayScore}</span>` : ""}
          </div>

          <div class="score-team-row home">
            <img src="assets/logo/${homeId}.png"
                 onerror="this.style.display='none'">
            <span>${homeName}</span>
            ${hasScore ? `<span class="score">${g.homeScore}</span>` : ""}
          </div>

          <div class="score-status">
            ${hasScore ? "FINAL" : "SCHEDULED"}
          </div>

        </a>
      `;
    }).join("");

  });


  /* =========================
     左右滑動控制
  ========================= */

  const scrollAmount = 320;

  if (leftBtn) {
    leftBtn.addEventListener("click", () => {
      strip.scrollBy({
        left: -scrollAmount,
        behavior: "smooth"
      });
    });
  }

  if (rightBtn) {
    rightBtn.addEventListener("click", () => {
      strip.scrollBy({
        left: scrollAmount,
        behavior: "smooth"
      });
    });
  }

});
</script>


<script>
/* =========================
   首頁：本週焦點對戰（可點擊版）
========================= */

(function () {

  const box = document.getElementById("focusGameContent");
  if (!box) return;

  const TEAM_ID_MAP = {
    "中信兄弟": "brothers",
    "統一7-ELEVEn獅": "lions",
    "樂天桃猿": "monkeys",
    "味全龍": "dragons",
    "富邦悍將": "guardians",
    "台鋼雄鷹": "hawks"
  };

  const TICKET_LINKS = {
    "中信兄弟": "https://tix.brothers.tw/",
    "統一7-ELEVEn獅": "https://ticket.uni-lions.com.tw/",
    "樂天桃猿": "https://www.rakuteneagles.com.tw/ticket",
    "味全龍": "https://ticket.dragon-baseball.com.tw/",
    "富邦悍將": "https://www.fubon-guardians.com/ticket",
    "台鋼雄鷹": "https://www.tsghawks.com/ticket"
  };

  const today = new Date().toISOString().slice(0,10);
  const months = ["2026-03","2026-04","2026-05","2026-06","2026-07","2026-08"];

  Promise.all(
    months.map(m =>
      fetch(`data/schedule-${m}.json`)
        .then(r => r.ok ? r.json() : [])
        .catch(()=>[])
    )
  ).then(results => {

    const games = results.flat()
      .filter(g => g?.date && g?.teams?.home && g?.teams?.away)
      .sort((a,b)=>a.date.localeCompare(b.date));

    const nextGame = games.find(g => g.date >= today);

    if (!nextGame) {
      box.innerHTML = "近期沒有賽程";
      return;
    }

    const home = nextGame.teams.home;
    const away = nextGame.teams.away;

    const homeId = TEAM_ID_MAP[home];
    const awayId = TEAM_ID_MAP[away];

    const link =
      `match.html?date=${nextGame.date}` +
      `&home=${encodeURIComponent(home)}` +
      `&away=${encodeURIComponent(away)}`;

    const hasScore =
      typeof nextGame.homeScore === "number" &&
      typeof nextGame.awayScore === "number";

    let status = "⏳ 未開打";
    if (nextGame.status === "live") status = "🔴 LIVE";
    if (nextGame.status === "final") status = "✅ FINAL";

    box.innerHTML = `
      <a href="${link}" style="text-decoration:none;color:inherit;">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:10px;">
          <img src="assets/logo/${awayId}.png" width="40">
          <strong>${away}</strong>
          <span>VS</span>
          <strong>${home}</strong>
          <img src="assets/logo/${homeId}.png" width="40">
        </div>

        <div style="margin-bottom:6px;">
          📅 ${nextGame.date}
        </div>

        <div style="margin-bottom:10px;font-weight:700;">
          ${status}
          ${hasScore ? `｜ ${nextGame.awayScore} : ${nextGame.homeScore}` : ""}
        </div>
      </a>

      ${TICKET_LINKS[home] && nextGame.status !== "final"
        ? `<a href="${TICKET_LINKS[home]}" target="_blank"
             class="card-link">🎟 主場購票</a>`
        : ""
      }
    `;

  });

})();
</script>

<script>
/* =========================
   今日焦點自動輪播（可點擊版）
========================= */

(function () {

  const track = document.getElementById("focusTrack");
  const dotsBox = document.getElementById("focusDots");
  if (!track) return;

  const TEAM_ID_MAP = {
    "中信兄弟": "brothers",
    "統一7-ELEVEn獅": "lions",
    "樂天桃猿": "monkeys",
    "味全龍": "dragons",
    "富邦悍將": "guardians",
    "台鋼雄鷹": "hawks"
  };

  const today = new Date().toISOString().slice(0,10);
  const months = ["2026-03","2026-04","2026-05","2026-06","2026-07","2026-08"];

  Promise.all(
    months.map(m =>
      fetch(`data/schedule-${m}.json`)
        .then(r => r.ok ? r.json() : [])
        .catch(()=>[])
    )
  ).then(results => {

    const games = results.flat()
      .filter(g => g?.date && g?.teams?.home && g?.teams?.away);

    let targetGames = games.filter(g => g.date === today);

    if (!targetGames.length) {
      targetGames = games
        .filter(g => g.date > today)
        .sort((a,b)=>a.date.localeCompare(b.date))
        .slice(0,3);
    }

    if (!targetGames.length) {
      track.innerHTML = `<div class="focus-slide">近期沒有賽程</div>`;
      return;
    }

    track.innerHTML = targetGames.map(g => {

      const home = g.teams.home;
      const away = g.teams.away;

      const homeId = TEAM_ID_MAP[home];
      const awayId = TEAM_ID_MAP[away];

      const link =
        `match.html?date=${g.date}` +
        `&home=${encodeURIComponent(home)}` +
        `&away=${encodeURIComponent(away)}`;

      const hasScore =
        typeof g.homeScore === "number" &&
        typeof g.awayScore === "number";

      let status = "⏳ 未開打";
      if (g.status === "live") status = "🔴 LIVE";
      if (g.status === "final") status = "✅ FINAL";

      return `
        <a href="${link}" class="focus-slide"
           style="text-decoration:none;color:inherit;">
          <div style="display:flex;align-items:center;justify-content:center;gap:14px;">
            <img src="assets/logo/${awayId}.png" width="36">
            <strong>${away}</strong>
            <span>VS</span>
            <strong>${home}</strong>
            <img src="assets/logo/${homeId}.png" width="36">
          </div>

          <div style="margin-top:8px;font-weight:700;text-align:center;">
            ${status}
            ${hasScore ? `｜ ${g.awayScore} : ${g.homeScore}` : ""}
          </div>

          <div style="margin-top:6px;text-align:center;">
            📅 ${g.date}
          </div>
        </a>
      `;
    }).join("");

    dotsBox.innerHTML = targetGames.map((_,i)=>
      `<span class="focus-dot ${i===0?"active":""}" data-index="${i}"></span>`
    ).join("");

    let current = 0;
    const total = targetGames.length;

    function goToSlide(index) {
      track.style.transform = `translateX(-${index * 100}%)`;
      document.querySelectorAll(".focus-dot")
        .forEach(d=>d.classList.remove("active"));
      document.querySelector(`.focus-dot[data-index="${index}"]`)
        ?.classList.add("active");
      current = index;
    }

    document.querySelectorAll(".focus-dot").forEach(dot=>{
      dot.addEventListener("click",()=>{
        goToSlide(parseInt(dot.dataset.index));
      });
    });

    if (total > 1) {
      setInterval(()=>{
        let next = (current + 1) % total;
        goToSlide(next);
      }, 4000);
    }

  });

})();
</script>
<script>
/* =========================
   日期切換功能
========================= */

document.addEventListener("DOMContentLoaded", () => {

  const currentDateText = document.getElementById("currentDateText");
  const gameCountText = document.getElementById("gameCountText");
  const prevBtn = document.getElementById("prevDate");
  const nextBtn = document.getElementById("nextDate");

  if (!currentDateText) return;

  let currentDate = new Date();

  const months = ["2026-03","2026-04","2026-05","2026-06","2026-07","2026-08"];

  function formatDate(d) {
    return d.toISOString().slice(0,10);
  }

  function renderDateInfo() {

    const dateStr = formatDate(currentDate);
    currentDateText.textContent = dateStr;

    const month = dateStr.slice(0,7);

    fetch(`data/schedule-${month}.json`)
      .then(r => r.ok ? r.json() : [])
      .then(games => {
        const todayGames = games.filter(g => g.date === dateStr);
        if (todayGames.length) {
          gameCountText.textContent = `今日有 ${todayGames.length} 場比賽`;
        } else {
          gameCountText.textContent = "今日沒有比賽";
        }
      })
      .catch(() => {
        gameCountText.textContent = "賽程資料讀取失敗";
      });

  }

  prevBtn.onclick = () => {
    currentDate.setDate(currentDate.getDate() - 1);
    renderDateInfo();
  };

  nextBtn.onclick = () => {
    currentDate.setDate(currentDate.getDate() + 1);
    renderDateInfo();
  };

  renderDateInfo();

});
</script>
